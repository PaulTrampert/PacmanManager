services:
  pacmanmanager.repohost:
    image: pacmanmanager.repohost
    build:
      context: .
      dockerfile: PacmanManager.RepoHost/Dockerfile
    ports:
      - "5000:80"
        
  auth:
    image: quay.io/keycloak/keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/:/opt/keycloak/data/import/
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "http://localhost:8080"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      
  migrations:
    image: pacmanmanager.migrations
    build:
      context: .
      dockerfile: PacmanManager.Migrations/Dockerfile
    depends_on:
      - postgres
        
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: pacmanmanager
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/
        
volumes:
  pgdata:

